<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="تطبيق بُرء">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="بُرء">
  <link rel="apple-touch-icon" href="assets/images/logo.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/logo.png">

  <title>بُرء</title>
  <link rel="manifest" href="manifest.json">

  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
</head>
<body>
  <!-- شاشة البداية للشعار والنص -->
  <div id="splash-screen" style="background-color:#FFFFFF; width:100%; height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;">
    <!-- الشعار -->
    <img src="assets/images/logo.png" style="width:150px; height:150px;" />

    <!-- النص أسفل الشعار -->
    <img src="assets/images/splash_text.png" style="margin-top:20px; width:auto; max-width:80%;" />
  </div>

  <!-- تشغيل Flutter -->
  <script src="flutter_bootstrap.js" async=""></script>

  <!-- إزالة شاشة البداية بعد تحميل Flutter -->
  <script>
    window.addEventListener('load', function() {
      const splash = document.getElementById('splash-screen');
      if (splash) {
        splash.style.display = 'none';
      }
    });
  </script>
</body>
</html>
